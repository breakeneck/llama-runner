<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llama Runner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1b26; color: #a9b1d6; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 16px; }

        h1 { color: #7aa2f7; font-size: 1.4rem; margin: 0; white-space: nowrap; }

        /* Combined Header Panel */
        .header-panel {
            background: #24283b; border: 1px solid #414868; border-radius: 8px;
            padding: 12px 16px; margin-bottom: 10px;
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
        }
        .gpu-stats { display: flex; gap: 16px; font-size: 0.85rem; flex-wrap: wrap; }
        .gpu-stat { color: #a9b1d6; }
        .gpu-stat span { color: #7aa2f7; font-weight: bold; }

        /* Controls */
        .controls { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
        input[type="text"] {
            background: #24283b; border: 1px solid #414868; color: #c0caf5; padding: 7px 12px;
            border-radius: 6px; font-size: 0.85rem; flex: 1; outline: none;
        }
        input[type="text"]:focus { border-color: #7aa2f7; }

        /* Buttons */
        .btn {
            padding: 6px 12px; border: none; border-radius: 6px; cursor: pointer;
            font-size: 0.8rem; font-weight: bold; transition: all 0.2s; white-space: nowrap;
        }
        .btn-primary { background: #7aa2f7; color: #1a1b26; }
        .btn-primary:hover { background: #5d8ae9; }
        .btn-success { background: #9ece6a; color: #1a1b26; }
        .btn-success:hover { background: #8abf5b; }
        .btn-danger { background: #f7768e; color: #1a1b26; }
        .btn-danger:hover { background: #e0647c; }
        .btn-small { padding: 4px 8px; font-size: 0.75rem; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Model Table */
        .model-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .model-table th { text-align: left; padding: 8px 10px; background: #24283b; color: #7aa2f7; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; user-select: none; position: sticky; top: 0; }
        .model-table th:first-child { border-radius: 8px 0 0 0; }
        .model-table th:last-child { border-radius: 0 8px 0 0; }
        .model-table th:hover { background: #292e42; }
        .model-table td { padding: 6px 10px; border-bottom: 1px solid #2f354b; vertical-align: middle; }
        .model-row { background: #1a1b26; transition: background 0.2s; }
        .model-row:hover { background: #24283b; }
        .model-row.running-row { background: #1a2e1a; }
        .model-name { color: #c0caf5; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .model-path { display: block; font-size: 0.7rem; color: #565f89; margin-top: 1px; word-break: break-all; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .model-path:hover { white-space: normal; }

        /* Config Panel */
        .config-panel {
            background: #24283b; border-radius: 6px; padding: 10px; margin-top: 4px;
            display: none; border: 1px solid #414868; font-size: 0.8rem;
        }
        .config-panel.visible { display: block; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 8px; }
        .form-group label { display: flex; align-items: center; gap: 4px; font-size: 0.75rem; color: #7aa2f7; margin-bottom: 2px; }
        .form-group input[type="number"], .form-group input[type="text"] {
            width: 100%; background: #1a1b26; border: 1px solid #414868; color: #c0caf5;
            padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; outline: none;
        }
        .form-group input:focus { border-color: #7aa2f7; }
        .toggle-label { display: flex; align-items: center; gap: 3px; cursor: pointer; color: #a9b1d6; font-size: 0.75rem; }
        .toggle-label input[type="checkbox"] { accent-color: #7aa2f7; width: 14px; height: 14px; }
        .form-group.disabled input:not([type="checkbox"]) { opacity: 0.3; }

        /* Status */
        .status { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; white-space: nowrap; }
        .status-stopped { background: #414868; color: #a9b1d6; }
        .status-running { background: #9ece6a; color: #1a1b26; animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* Spinner */
        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 4px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .no-models { text-align: center; padding: 30px; color: #565f89; font-size: 1rem; }

        /* Notification Banner */
        .notification-banner {
            background: #24283b; border: 1px solid #7aa2f7; border-radius: 8px;
            padding: 10px 16px; margin-bottom: 10px; display: none; align-items: center; gap: 12px;
        }
        .notification-banner.visible { display: flex; }
        .notification-banner .notif-text { color: #9ece6a; font-size: 0.9rem; font-weight: bold; }
        .notification-banner .notif-detail { color: #7aa2f7; font-size: 0.8rem; margin-left: auto; white-space: nowrap; cursor: pointer; }
        .notification-banner .notif-close { background:none;border:none;color:#565f89;font-size:1.2rem;cursor:pointer;padding:0 4px; }

        /* Log Modal */
        #log-modal { display:none; position:fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.6); z-index:999; justify-content:center; align-items:center; }
        #log-modal.visible { display:flex; }
        #log-box { background:#1a1b26; border:1px solid #414868; border-radius:8px; width:80%; max-width:900px; height:75%; display:flex; flex-direction:column; }
        #log-header { padding:10px 16px; background:#24283b; border-bottom:1px solid #414868; border-radius:8px 8px 0 0; display:flex; justify-content:space-between; align-items:center; color:#7aa2f7; font-weight:bold; }
        #log-body { flex:1; overflow:auto; padding:10px; font-family:'Courier New',monospace; font-size:0.75rem; line-height:1.4; color:#a9b1d6; white-space:pre-wrap; word-break:break-all; }
        #log-refresh { background:none;border:1px solid #414868;color:#7aa2f7;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:0.75rem;margin-right:6px; }
    </style>
</head>
<body>
<div class="container">
    <!-- Title + VRAM in one row -->
    <div class="header-panel">
        <h1>🦙 Llama Runner</h1>
        <div id="vram-content" class="gpu-stats" onclick="refreshVRAM()" title="Click to refresh">Loading...</div>
    </div>

    <!-- Notification Banner -->
    <div id="notification-banner" class="notification-banner">
        <span id="notif-text" class="notif-text"></span>
        <span id="notif-detail" class="notif-detail"></span>
        <button class="notif-close" onclick="hideNotification()">×</button>
    </div>

    <div class="controls">
        <input type="text" id="search-input" placeholder="🔍 Filter models..." oninput="renderModels()">
        <button class="btn btn-primary" onclick="refreshModels()">⟳ Refresh</button>
    </div>

    <!-- Model List -->
    <table class="model-table">
        <thead>
            <tr>
                <th style="width:42%" onclick="setSort('name')">Name ↕</th>
                <th style="width:10%" onclick="setSort('size')" class="sort-size">Size ↕</th>
                <th style="width:12%" onclick="setSort('date')">Date ↕</th>
                <th style="width:8%">Status</th>
                <th style="width:28%">Actions</th>
            </tr>
        </thead>
        <tbody id="model-list"></tbody>
    </table>

    <div id="no-models" class="no-models" style="display:none;">No models found. Check MODEL_DIR configuration.</div>

    <!-- Log Modal -->
    <div id="log-modal">
        <div id="log-box">
            <div id="log-header">
                <span id="log-title">Log</span>
                <div>
                    <button class="btn btn-small" id="log-refresh-btn" onclick="fetchModelLog()">⟳ Refresh</button>
                    <button class="btn btn-small" onclick="hideLogModal()">×</button>
                </div>
            </div>
            <pre id="log-body"></pre>
        </div>
    </div>
</div>

<script>
let allModels = [];
let runningModels = {};
let savedParamsCache = {};
let sortField = 'name';
let sortDir = 1;   // 1 = asc, -1 = desc
let vramInterval = null;
const modelOrderMap = {};  // path -> original index (for stable re-insertion)

document.addEventListener('DOMContentLoaded', () => {
    refreshVRAM();
    loadModelsAndStatus();
});

async function refreshVRAM() {
    try {
        const resp = await fetch('/api/vram');
        const data = await resp.json();
        renderVRAM(data);
    } catch (e) {
        document.getElementById('vram-content').innerHTML = '<span style="color:#f7768e">Failed to get VRAM info</span>';
    }
}

function renderVRAM(data) {
    const el = document.getElementById('vram-content');
    if (!data.gpus || data.gpus.length === 0) {
        el.innerHTML = '<span style="color:#565f89">No GPUs detected</span>';
        return;
    }
    let html = '';
    for (const gpu of data.gpus) {
        const pct = Math.round(gpu.used * 100 / gpu.total);
        html += `<div class="gpu-stat"><strong>${gpu.name}</strong> · ${gpu.used}GB/${gpu.total}GB `;
        html += `<span style="display:inline-block;width:60px;height:5px;background:#414868;border-radius:3px;overflow:hidden;vertical-align:middle;"><span style="display:block;height:100%;width:${pct}%;background:linear-gradient(90deg,#7aa2f7,#bb9af7);"></span></span>`;
        html += ` · ${gpu.temp}°C · ${gpu.power}W</div>`;
    }
    el.innerHTML = html;
}

async function loadModelsAndStatus() {
    try {
        const [modelsResp, statusResp] = await Promise.all([
            fetch('/api/models'),
            fetch('/api/status')
        ]);
        allModels = await modelsResp.json();
        // Assign original indices for stable ordering
        allModels.forEach((m, i) => { modelOrderMap[m.path] = i; });
        const status = await statusResp.json();
        runningModels = {};
        for (const m of status.running) {
            runningModels[m.path] = m;
        }
        renderModels();
    } catch (e) { console.error('Failed to load:', e); }
}

function setSort(field) {
    if (sortField === field) sortDir *= -1;
    else { sortField = field; sortDir = 1; }
    renderModels();
}

function getSortedFiltered() {
    const filter = document.getElementById('search-input').value.toLowerCase();
    let filtered = allModels.filter(m => m.name.toLowerCase().includes(filter) || (m.path && m.path.toLowerCase().includes(filter)));

        // Sort
        filtered.sort((a, b) => {
            if (sortField === 'name') return a.name.localeCompare(b.name) * sortDir;
            if (sortField === 'size') {
                const sa = a.size_gb || 0;
                const sb = b.size_gb || 0;
                return (sa - sb) * sortDir;
            }
            if (sortField === 'date') {
                const da = a.mtime || 0;
                const db = b.mtime || 0;
                return (da - db) * sortDir;
            }
            return 0;
        });

    // Pin running models to top while preserving relative order within groups
    const running = filtered.filter(m => runningModels[m.path]);
    const stopped = filtered.filter(m => !runningModels[m.path]);

    return { running, stopped };
}

function renderModels() {
    const tbody = document.getElementById('model-list');
    const { running, stopped } = getSortedFiltered();
    const all = [...running, ...stopped];

    if (allModels.length === 0) {
        tbody.innerHTML = '';
        document.getElementById('no-models').style.display = 'block';
        return;
    }

    if (all.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#565f89;padding:20px;">No models match filter</td></tr>';
        document.getElementById('no-models').style.display = 'none';
        return;
    }

    document.getElementById('no-models').style.display = 'none';
    let html = '';
    for (const model of all) {
        const running = runningModels[model.path];
        const statusClass = running ? 'status-running' : 'status-stopped';
        const statusText = running ? `● ${MODEL_PORT}` : '○ Stopped';
        const isRunning = !!running;
        const rowClass = isRunning ? 'model-row running-row' : 'model-row';
        const h = hashStr(model.path);

        html += `<tr class="${rowClass}">`;
        html += `<td>`;
        html += `<span class="model-name" onclick="toggleConfig('${escAttr(model.path)}')">${model.name}</span>`;
        if (model.split_parts) html += ` <span style="font-size:0.65rem;color:#bb9af7;">(${model.split_parts} parts)</span>`;
        html += `<span class="model-path" title="${escAttr(model.path)}">${model.path}</span>`;

        // Config panel inline
        html += `<div id="config-${h}" class="config-panel">`;
        for (const field of ['ctx_size', 'temp', 'cache_type_k', 'cache_type_v', 'n_gpu_layers']) {
            const label = { ctx_size: 'Context (k)', temp: 'Temp', cache_type_k: 'Cache K', cache_type_v: 'Cache V', n_gpu_layers: 'GPU Layers' }[field];
            const inputType = (field === 'cache_type_k' || field === 'cache_type_v') ? 'text' : 'number';
            const stepAttr = field === 'temp' ? 'step="0.1"' : '';
            html += `<div class="form-group" id="fg-${h}-${field}">`;
            html += `<label class="toggle-label"><input type="checkbox" checked onchange="toggleField('${h}','${field}',this.checked)">${label}</label>`;
            if (inputType === 'number') {
                html += `<input type="${inputType}" id="${field}-${h}" ${stepAttr}>`;
            } else {
                html += `<input type="${inputType}" id="${field}-${h}">`;
            }
            html += `</div>`;
        }
        html += `<div style="display:flex;gap:6px;margin-top:4px;">`;
        if (isRunning) {
            html += `<button class="btn btn-danger btn-small" onclick="stopModel('${escAttr(model.path)}')">⏹ Stop</button>`;
        } else {
            html += `<button class="btn btn-success btn-small" onclick="runFromConfig('${escAttr(model.path)}', '${h}')">▶ Run</button>`;
        }
        html += `<button class="btn btn-primary btn-small" onclick="saveAndShowParams('${escAttr(model.path)}', '${h}')">💾 Save</button>`;
        html += `<span id="msg-${h}" style="color:#73daca;font-size:0.75rem;"></span>`;
        html += `</div></div></td>`;

        // Size column
        const size = model.size_gb ? `${model.size_gb} GB` : '—';
        html += `<td style="color:#a9b1d6;font-size:0.8rem;">${size}</td>`;

        // Date column
        const mtime = model.mtime ? new Date(model.mtime).toLocaleDateString() : '—';
        html += `<td style="color:#565f89;font-size:0.75rem;">${mtime}</td>`;

        // Status column
        html += `<td><span class="status ${statusClass}">${statusText}</span></td>`;

        // Actions column
        html += `<td style="display:flex;gap:4px;flex-wrap:wrap;">`;
        html += `<button class="btn btn-primary btn-small" onclick="toggleConfig('${escAttr(model.path)}')">⚙ Config</button>`;
        if (isRunning) {
            html += `<button class="btn btn-danger btn-small" onclick="stopModel('${escAttr(model.path)}')">⏹ Stop</button>`;
            html += `<button class="btn btn-primary btn-small" onclick="showLogModal('${escAttr(model.path)}', '${model.name}')">📋 Log</button>`;
        } else {
            html += `<button class="btn btn-success btn-small" onclick="runWithSaved('${escAttr(model.path)}', '${h}')">▶ Run</button>`;
        }
        html += `</td></tr>`;
    }
    tbody.innerHTML = html;
}

function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return Math.abs(h).toString(36); }
const MODEL_PORT = {{ MODEL_PORT }};

// Model paths are filesystem paths — just escape single quotes for inline JS
const escAttr = (s) => s.replace(/'/g, String.fromCharCode(92) + "'");

async function _loadParamsForModel(path) {
    if (savedParamsCache[path]) return savedParamsCache[path];
    try {
        const resp = await fetch('/api/models/params/' + encodeURIComponent(path));
        const data = await resp.json();
        savedParamsCache[path] = data;
        return data;
    } catch { return null; }
}

async function _saveParamsForModel(path, params) {
    try {
        const resp = await fetch('/api/models/params', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ path, ...params }) });
        const data = await resp.json();
        if (data.ok) { savedParamsCache[path] = { ...savedParamsCache[path], ...params }; return true; }
    } catch {}
    return false;
}

function toggleField(h, field, checked) {
    const fg = document.getElementById(`fg-${h}-${field}`);
    if (fg) {
        fg.classList.toggle('disabled', !checked);
        const input = fg.querySelector('input:not([type="checkbox"])');
        if (input) input.disabled = !checked;
    }
}

async function toggleConfig(path) {
    refreshVRAM();
    const h = hashStr(path);
    const panel = document.getElementById('config-' + h);
    if (!panel) return;
    if (panel.classList.toggle('visible')) {
        // Load params and populate
        const params = await _loadParamsForModel(path);
        const defaults = { ctx_size: 100, temp: 0.2, cache_type_k: 'q8_0', cache_type_v: 'q8_0', n_gpu_layers: 999 };
        for (const field of ['ctx_size', 'temp', 'cache_type_k', 'cache_type_v', 'n_gpu_layers']) {
            const input = document.getElementById(`${field}-${h}`);
            const fg = document.getElementById(`fg-${h}-${field}`);
            if (!input) continue;
            const val = params ? params[field] : defaults[field];
            input.value = val;
            // Toggle checkbox
            const enabled = params ? (params[`${field}_enabled`] !== false) : true;
            const cb = fg.querySelector('input[type="checkbox"]');
            if (cb) { cb.checked = enabled; toggleField(h, field, enabled); }
        }
    }
}

function collectConfigFields(path, h) {
    const fields = ['ctx_size', 'temp', 'cache_type_k', 'cache_type_v', 'n_gpu_layers'];
    const result = {};
    for (const field of fields) {
        const fg = document.getElementById(`fg-${h}-${field}`);
        const cb = fg ? fg.querySelector('input[type="checkbox"]') : null;
        const input = document.getElementById(`${field}-${h}`);
        result[`${field}_enabled`] = cb ? cb.checked : true;
        if (input) {
            result[field] = (field === 'temp') ? parseFloat(input.value) : (field === 'n_gpu_layers' || field === 'ctx_size') ? parseInt(input.value) : input.value;
        }
    }
    return result;
}

async function runWithSaved(path, h) {
    // Fetch saved params then run
    const params = await _loadParamsForModel(path);
    if (!params) { toggleConfig(path); return; }  // open config to show defaults

    const payload = { path };
    for (const field of ['ctx_size', 'temp', 'cache_type_k', 'cache_type_v', 'n_gpu_layers']) {
        payload[`${field}_enabled`] = params[`${field}_enabled`] !== false;
        payload[field] = params[field];
    }
    doRun(path, h, payload);
}

async function runFromConfig(path, h) {
    const config = collectConfigFields(path, h);
    // Auto-save then run
    await _saveParamsForModel(path, config);
    const payload = { path, ...config };
    doRun(path, h, payload);
}

async function doRun(path, h, payload) {
    const msgEl = document.getElementById('msg-' + h);
    msgEl.innerHTML = '<span class="spinner"></span> Starting...';
    try {
        const resp = await fetch('/api/models/run', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
        const data = await resp.json();
        if (data.ok) {
            msgEl.innerHTML = '<span style="color:#9ece6a">✓ Started</span>';
            refreshVRAM();

            // Look up model name and start polling for layer info
            const model = allModels.find(m => m.path === path);
            const modelName = model ? model.name : path;
            startModelInfoPoll(path, modelName);

            setTimeout(() => loadModelsAndStatus(), 2000);
        } else {
            msgEl.innerHTML = `<span style="color:#f7768e">✗ ${data.error || 'Failed'}</span>`;
        }
    } catch (e) {
        msgEl.innerHTML = `<span style="color:#f7768e">✗ Error: ${e.message}</span>`;
    }
}

async function saveAndShowParams(path, h) {
    const config = collectConfigFields(path, h);
    await _saveParamsForModel(path, config);
    const msgEl = document.getElementById('msg-' + h);
    msgEl.innerHTML = '<span style="color:#9ece6a">✓ Saved</span>';
    setTimeout(() => { msgEl.innerHTML = ''; }, 2000);
}

async function stopModel(path) {
    // Cancel any active poll for this model and hide notification
    stopModelInfoPoll(path);
    hideNotification();

    try {
        const resp = await fetch('/api/models/stop', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({path}) });
        const data = await resp.json();
        if (data.ok) {
            refreshVRAM();
            setTimeout(() => loadModelsAndStatus(), 1500);
        }
    } catch (e) { alert('Error stopping model: ' + e.message); }
}

// ── Notification helpers ────────────────────────────────────────────────

function hideNotification() {
    document.getElementById('notification-banner').classList.remove('visible');
}

function showNotification(text, detail) {
    document.getElementById('notif-text').textContent = text;
    const detailEl = document.getElementById('notif-detail');
    if (detail) {
        detailEl.textContent = detail;
        detailEl.style.display = '';
    } else {
        detailEl.style.display = 'none';
    }
    document.getElementById('notification-banner').classList.add('visible');
}

// ── Model info poller (layers loaded) ──────────────────────────────────

let _modelInfoPollTimers = new Map();  // path -> interval id

function startModelInfoPoll(path, modelName) {
    // Cancel any existing poll for this model
    stopModelInfoPoll(path);

    const bannerText = document.getElementById('notif-text');
    bannerText.innerHTML = '<span class="spinner"></span> Loading layers...';

    // Show immediately with spinner
    showNotification(`⏳ ${modelName} starting…`, 'Waiting for layer info…');

    let attempts = 0;
    const maxAttempts = 60; // poll up to 60 seconds (1s interval)

    const timer = setInterval(async () => {
        attempts++;
        try {
            const resp = await fetch('/api/model-info/' + encodeURIComponent(path));
            if (!resp.ok) return;
            const info = await resp.json();

            if (info.layers_loaded != null) {
                // Got layer count! Show notification with detail.
                let detailParts = [];
                if (info.vram_per_gpu_gib && info.vram_per_gpu_gib.length > 0) {
                    detailParts.push(`VRAM: ${info.vram_per_gpu_gib.join(' + ')} GiB`);
                }
                showNotification(
                    `✓ ${modelName}: ${info.layers_loaded} layers loaded`,
                    detailParts.join(' · ') || null
                );
                clearInterval(timer);
                stopModelInfoPoll(path);
            } else if (attempts >= maxAttempts) {
                // Timeout — still show something
                showNotification(`✓ ${modelName} running`, 'Layer info unavailable');
                clearInterval(timer);
                stopModelInfoPoll(path);
            } else {
                // Still loading — update spinner text with attempt count
                bannerText.innerHTML = `<span class="spinner"></span> Loading layers… (${attempts}s)`;
            }
        } catch (e) { /* silently retry */ }
    }, 1000);

    _modelInfoPollTimers.set(path, timer);
}

function stopModelInfoPoll(path) {
    const timer = _modelInfoPollTimers.get(path);
    if (timer) { clearInterval(timer); _modelInfoPollTimers.delete(path); }
}

// ── Log Modal ───────────────────────────────────────────────────────────

let _currentLogPath = null;  // path of model currently being viewed in log modal

function showLogModal(path, name) {
    _currentLogPath = path;
    document.getElementById('log-title').textContent = `📋 ${name} — Log`;
    document.getElementById('log-modal').classList.add('visible');
    fetchModelLog();
}

function hideLogModal() {
    document.getElementById('log-modal').classList.remove('visible');
    _currentLogPath = null;
}

async function fetchModelLog() {
    if (!_currentLogPath) return;
    const bodyEl = document.getElementById('log-body');
    try {
        const resp = await fetch('/api/model-log/' + encodeURIComponent(_currentLogPath));
        const data = await resp.json();
        bodyEl.textContent = (data.lines || []).join('\n');
        // Scroll to bottom
        bodyEl.scrollTop = bodyEl.scrollHeight;
    } catch (e) {
        bodyEl.textContent = 'Failed to load log: ' + e.message;
    }
}

async function refreshModels() { await loadModelsAndStatus(); }
</script>
